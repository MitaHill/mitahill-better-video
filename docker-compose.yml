services:
  realesrgan_app:
    build: .
    container_name: realesrgan_app
    ports:
      - "8501:8501"
    volumes:
      - ./:/workspace
    environment:
      PYTHONPATH: "/workspace/app:/workspace/vendor/Real-ESRGAN:${PYTHONPATH}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    runtime: nvidia
    ipc: host
    command: streamlit run /workspace/app/src_ui/main.py --server.port=8501 --server.address=0.0.0.0
