version: '3.8'

services:
  app:
    image: realesrgan-web-app:20260108-1142
    container_name: realesrgan_app
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - PYTHONUNBUFFERED=1
    command: streamlit run /workspace/app/src_ui/main.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      # Mount the output directory to persist data
      - ../output:/workspace/output
      # Mount the .env file for configuration
      - ../.env:/workspace/.env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
