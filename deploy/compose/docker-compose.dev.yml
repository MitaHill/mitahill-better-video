services:
  better_video:
    build:
      context: ../..
      dockerfile: deploy/docker/for-app/Dockerfile
    container_name: better_video
    ports:
      - "8501:8501"
    volumes:
      - ../../:/workspace
    environment:
      PYTHONPATH: "/workspace/app:${PYTHONPATH}"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
    runtime: nvidia
    ipc: host
    command: python3 app/main.py
